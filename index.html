<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gavi — Master List</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #161922;
    --panel-2: #1d212c;
    --border: #2a2f3d;
    --text: #e8e9ed;
    --muted: #8b91a3;
    --accent: #c9a14a; /* gold */
    --accent-soft: #c9a14a22;
    --navy: #2c3e6b;
    --danger: #b4544a;
    --success: #5a8a6f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    padding: 18px 16px 10px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  h1 {
    font-size: 18px;
    font-weight: 600;
    margin: 0 0 2px;
    letter-spacing: 0.2px;
  }
  .subtitle {
    color: var(--muted);
    font-size: 12.5px;
  }
  .status {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    min-height: 14px;
  }
  .board {
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 14px 12px 80px;
  }
  .column {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  .col-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }
  .col-title {
    font-size: 13.5px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .dot.master { background: var(--navy); }
  .dot.weekly { background: var(--accent); }
  .dot.daily  { background: var(--success); }
  .count {
    font-size: 11px;
    color: var(--muted);
    background: var(--panel-2);
    border-radius: 20px;
    padding: 2px 8px;
  }
  .col-body {
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 40px;
  }
  .empty {
    color: var(--muted);
    font-size: 12.5px;
    padding: 10px 8px;
    text-align: center;
  }
  .item {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 10px;
  }
  .item-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .item-text {
    font-size: 13.5px;
    line-height: 1.4;
    flex: 1;
  }
  .item-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
  }
  .tag {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    padding: 2px 7px;
    border-radius: 20px;
    color: var(--bg);
    background: var(--muted);
    font-weight: 600;
  }
  .entry-action {
    font-size: 11.5px;
    color: var(--muted);
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px dashed var(--border);
  }
  .entry-action b { color: var(--text); font-weight: 500; }
  .item-buttons {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .icon-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    width: 26px;
    height: 26px;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .icon-btn:active { background: var(--accent-soft); color: var(--accent); }
  .icon-btn.del:active { background: #b4544a22; color: var(--danger); }
  .add-row {
    display: flex;
    gap: 6px;
    padding: 8px;
    border-top: 1px solid var(--border);
  }
  .add-row input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 13px;
  }
  .add-row input:focus { outline: 1px solid var(--accent); }
  .add-row button {
    background: var(--accent);
    color: #1a1a1a;
    border: none;
    border-radius: 8px;
    padding: 0 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .add-row button:active { opacity: 0.8; }

  /* expanded edit panel */
  .edit-panel {
    background: var(--bg);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 10px;
    margin-top: 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .edit-panel input, .edit-panel select, .edit-panel textarea {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 7px 9px;
    font-size: 12.5px;
    font-family: inherit;
  }
  .edit-panel textarea { resize: vertical; min-height: 36px; }
  .edit-row-label {
    font-size: 10.5px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: -3px;
  }
  .move-buttons {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .move-btn {
    flex: 1;
    min-width: 80px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 7px;
    font-size: 11.5px;
    cursor: pointer;
  }
  .move-btn:active { border-color: var(--accent); color: var(--accent); }
  .edit-close {
    text-align: center;
    font-size: 11.5px;
    color: var(--muted);
    padding-top: 2px;
  }
</style>
</head>
<body>

<header>
  <h1>Master List</h1>
  <div class="subtitle">Master → Weekly → Daily triage board</div>
  <div class="status" id="status"></div>
</header>

<div class="board" id="board"></div>

<script>
const SUPABASE_URL = 'https://fbkaafnyckxmngxpkpad.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZia2FhZm55Y2t4bW5neHBrcGFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MTIxMjksImV4cCI6MjA5ODM4ODEyOX0.d58a3RXbHnMyV6EU-QPTAey6q748QWMR2l7tsqKJM8s';
const REST_URL = SUPABASE_URL + '/rest/v1/master_list_items';

function sbHeaders(extra) {
  return Object.assign({
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json'
  }, extra || {});
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

const COLUMNS = [
  { key: 'master', label: 'Master', dotClass: 'master' },
  { key: 'weekly', label: 'This Week', dotClass: 'weekly' },
  { key: 'daily',  label: 'Today', dotClass: 'daily' },
];

const CATEGORIES = ['work','goh','health','coparenting','family','social','personal','admin'];

let items = [];
let expandedId = null;
let loaded = false;

async function loadItems() {
  setStatus('Loading…');
  try {
    const res = await fetch(REST_URL + '?select=*&order=created_at.asc', {
      headers: sbHeaders()
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    items = rows.map(r => ({
      id: r.id,
      text: r.text,
      column: r.column_key,
      category: r.category || '',
      entryAction: r.entry_action || ''
    }));
    setStatus('Loaded ' + items.length + ' item(s)');
  } catch (e) {
    setStatus('Load error: ' + (e && e.message ? e.message : String(e)));
  }
  loaded = true;
  render();
  setTimeout(() => setStatus(''), 3000);
}

async function addItem(column, text) {
  if (!text || !text.trim()) return;
  setStatus('Saving…');
  try {
    const res = await fetch(REST_URL, {
      method: 'POST',
      headers: sbHeaders({ 'Prefer': 'return=representation' }),
      body: JSON.stringify([{ text: text.trim(), column_key: column }])
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    const r = rows[0];
    items.push({ id: r.id, text: r.text, column: r.column_key, category: r.category || '', entryAction: r.entry_action || '' });
    setStatus('Saved');
  } catch (e) {
    setStatus('Save failed: ' + (e && e.message ? e.message : String(e)));
  }
  render();
  setTimeout(() => setStatus(''), 1500);
}

async function deleteItem(id) {
  items = items.filter(i => i.id !== id);
  render();
  try {
    const res = await fetch(REST_URL + '?id=eq.' + id, {
      method: 'DELETE',
      headers: sbHeaders()
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
  } catch (e) {
    setStatus('Delete failed: ' + (e && e.message ? e.message : String(e)));
    setTimeout(() => setStatus(''), 2500);
  }
}

async function moveItem(id, column) {
  const item = items.find(i => i.id === id);
  if (item) item.column = column;
  render();
  try {
    const res = await fetch(REST_URL + '?id=eq.' + id, {
      method: 'PATCH',
      headers: sbHeaders(),
      body: JSON.stringify({ column_key: column })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
  } catch (e) {
    setStatus('Move failed: ' + (e && e.message ? e.message : String(e)));
    setTimeout(() => setStatus(''), 2500);
  }
}

function updateField(id, field, value) {
  const item = items.find(i => i.id === id);
  if (item) item[field] = value;
}

async function commitEdit(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  setStatus('Saving…');
  try {
    const res = await fetch(REST_URL + '?id=eq.' + id, {
      method: 'PATCH',
      headers: sbHeaders(),
      body: JSON.stringify({ text: item.text, category: item.category, entry_action: item.entryAction })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    setStatus('Saved');
  } catch (e) {
    setStatus('Save failed: ' + (e && e.message ? e.message : String(e)));
  }
  render();
  setTimeout(() => setStatus(''), 1500);
}

function toggleExpand(id) {
  expandedId = expandedId === id ? null : id;
  render();
}

function renderItem(item) {
  const isExpanded = expandedId === item.id;
  const catTag = item.category ? `<span class="tag">${escapeHtml(item.category)}</span>` : '';
  const entryHtml = item.entryAction
    ? `<div class="entry-action">First action: <b>${escapeHtml(item.entryAction)}</b></div>`
    : '';

  let editPanel = '';
  if (isExpanded) {
    const catOptions = CATEGORIES.map(c =>
      `<option value="${c}" ${item.category === c ? 'selected' : ''}>${c}</option>`
    ).join('');
    const moveBtns = COLUMNS
      .filter(c => c.key !== item.column)
      .map(c => `<button class="move-btn" onclick="moveItem('${item.id}','${c.key}')">Move to ${c.label}</button>`)
      .join('');

    editPanel = `
      <div class="edit-panel" onclick="event.stopPropagation()">
        <div>
          <div class="edit-row-label">Task</div>
          <textarea oninput="updateField('${item.id}','text',this.value)" onblur="commitEdit('${item.id}')">${escapeHtml(item.text)}</textarea>
        </div>
        <div>
          <div class="edit-row-label">First physical action</div>
          <input type="text" placeholder="e.g. Open phone, dial first number" value="${escapeHtml(item.entryAction || '')}"
            oninput="updateField('${item.id}','entryAction',this.value)" onblur="commitEdit('${item.id}')">
        </div>
        <div>
          <div class="edit-row-label">Category</div>
          <select onchange="updateField('${item.id}','category',this.value); commitEdit('${item.id}')">
            <option value="">none</option>
            ${catOptions}
          </select>
        </div>
        <div class="move-buttons">${moveBtns}</div>
        <div class="edit-close" onclick="toggleExpand('${item.id}')">Close</div>
      </div>
    `;
  }

  return `
    <div class="item">
      <div class="item-top" onclick="toggleExpand('${item.id}')" style="cursor:pointer">
        <div class="item-text">${escapeHtml(item.text)}</div>
        <div class="item-buttons" onclick="event.stopPropagation()">
          <button class="icon-btn del" onclick="deleteItem('${item.id}')">✕</button>
        </div>
      </div>
      <div class="item-meta">${catTag}</div>
      ${entryHtml}
      ${editPanel}
    </div>
  `;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function render() {
  const board = document.getElementById('board');
  board.innerHTML = COLUMNS.map(col => {
    const colItems = items.filter(i => i.column === col.key);
    const body = colItems.length
      ? colItems.map(renderItem).join('')
      : `<div class="empty">Nothing here</div>`;

    return `
      <div class="column">
        <div class="col-head">
          <div class="col-title"><span class="dot ${col.dotClass}"></span>${col.label}</div>
          <div class="count">${colItems.length}</div>
        </div>
        <div class="col-body">${body}</div>
        <div class="add-row">
          <input type="text" placeholder="Add to ${col.label}…" id="add-${col.key}"
            onkeydown="if(event.key==='Enter'){addItem('${col.key}', this.value); this.value='';}">
          <button onclick="const el=document.getElementById('add-${col.key}'); addItem('${col.key}', el.value); el.value='';">Add</button>
        </div>
      </div>
    `;
  }).join('');
}

loadItems();
</script>

</body>
</html>
